<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Integrity Bingo 4x4</title>

<style>
* {
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(
        135deg,
        #0b041e 0%,
        #140b34 40%,
        #1d1145 70%,
        #3b1c75 100%
    );
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
    position: relative;
    overflow-x: hidden;
}

h1 {
    color: #f57c00; 
    font-size: 54px;
    font-weight: 900;
    text-shadow: 3px 3px 0px #ffffff, 6px 6px 0px #1d1145, 0px 10px 20px rgba(0,0,0,0.6);
    margin-top: 20px;
    margin-bottom: 30px;
    text-align: center;
    letter-spacing: 2px;
}

.controls {
    display: none;
}

table {
    border-collapse: separate;
    border-spacing: 10px;
    width: auto;
    max-width: 100%;
}

td {
    width: 150px;
    height: 150px;
    background: #ffffff;
    border-radius: 16px;
    border: 4px solid #f57c00; 
    text-align: center;
    vertical-align: middle;
    padding: 10px;
    font-weight: bold;
    font-size: 18px;
    color: #1d1145;
    cursor: pointer;
    transition: all 0.2s ease;
    user-select: none;
    box-shadow: 0 6px 12px rgba(0,0,0,0.3);
    white-space: normal;
    word-break: break-word; 
}

td:hover {
    transform: scale(1.04);
    box-shadow: 0 10px 20px rgba(245, 124, 0, 0.3);
}

td.marked {
    background: linear-gradient(
        135deg,
        #1d1145,
        #3b1c75
    );
    color: #ffffff;
    border-color: #ffffff;
}

#bingoMessage {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100%;
    background: rgba(29, 17, 69, 0.9); 
    padding: 40px 0;
    font-size: 72px;
    font-weight: 900;
    color: #fbbf24;
    text-align: center;
    text-shadow: 0 0 30px rgba(251, 191, 36, 0.8), 4px 4px 0px #f57c00;
    box-shadow: 0 0 50px rgba(0,0,0,0.8);
    display: none;
    z-index: 9999;
    pointer-events: none; 
    white-space: nowrap;
}

@media (max-width: 768px) {
    table {
        border-spacing: 6px; 
    }
    td {
        width: 21vw; 
        height: 21vw;
        max-width: 100px;
        max-height: 100px;
        font-size: 13px;
        border-width: 3px;
        padding: 4px;
    }
    h1 {
        font-size: 36px;
        text-shadow: 2px 2px 0px #ffffff, 4px 4px 0px #1d1145;
        margin-top: 20px;
    }
    #bingoMessage {
        font-size: 48px;
        padding: 25px 0;
    }
}
</style>
</head>

<body>

<h1>INTEGRITY BINGO</h1>

<div class="controls"></div>

<table id="bingoTable"></table>

<div id="bingoMessage">🎉 BINGO! 🎉</div>

<script>

const words = ["Accountability","Authenticity","Commitment","Empathy","Ethical","Fair","Honest","Integrity","Principle","Reliable","Respect","Sincere","Transparency","Trustworthy","กล้าหาญ","ขยัน","คุณธรรม","จริงใจ","ใจกว้าง","ชัดเจน","ซื่อสัตย์","ตั้งใจ","ถูกต้อง","น่าเชื่อถือ","โปร่งใส","พัฒนา","มั่นคง","มีวินัย","เมตตา","ยุติธรรม","ร่วมมือ","รอบคอบ","รับผิดชอบ","เรียนรู้","สม่ำเสมอ","สามัคคี","สุจริต","เสียสละ","ให้เกียรติ","อดทน","วุฒิภาวะ","น้ำใจ","กตัญญู","ละเอียด","รอบด้าน","สุภาพ","ตรงเวลา","มุ่งมั่น","วิสัยทัศน์","สร้างสรรค์","ถ่อมตน","เสมอภาค","กล้าแสดงออก","พึ่งพาได้","ยอมรับผิด","แบ่งปัน","เคารพสิทธิ","รู้หน้าที่","รู้คุณ","เห็นอกเห็นใจ"];

function createBingo() {

    const table = document.getElementById('bingoTable');
    table.innerHTML = '';

    document.getElementById('bingoMessage').style.display = 'none';

    const shuffled = [...words]
        .sort(() => Math.random() - 0.5)
        .slice(0,16);

    for(let i = 0; i < 4; i++) {

        const row = table.insertRow();

        for(let j = 0; j < 4; j++) {

            const cell = row.insertCell();

            cell.innerHTML = shuffled[i * 4 + j];

            cell.addEventListener('click', function() {
                this.classList.toggle('marked');
                checkBingo();
            });

        }
    }
}

function checkBingo() {

    const table = document.getElementById('bingoTable');
    const size = 4;

    let bingo = false;

    // แถว
    for(let i = 0; i < size; i++) {

        let complete = true;

        for(let j = 0; j < size; j++) {

            if(!table.rows[i].cells[j].classList.contains('marked')) {
                complete = false;
            }

        }

        if(complete) bingo = true;
    }

    // คอลัมน์
    for(let j = 0; j < size; j++) {

        let complete = true;

        for(let i = 0; i < size; i++) {

            if(!table.rows[i].cells[j].classList.contains('marked')) {
                complete = false;
            }

        }

        if(complete) bingo = true;
    }

    // ทแยงหลัก
    let diagonal1 = true;

    for(let i = 0; i < size; i++) {

        if(!table.rows[i].cells[i].classList.contains('marked')) {
            diagonal1 = false;
        }

    }

    if(diagonal1) bingo = true;

    // ทแยงรอง
    let diagonal2 = true;

    for(let i = 0; i < size; i++) {

        if(!table.rows[i].cells[size - 1 - i].classList.contains('marked')) {
            diagonal2 = false;
        }

    }

    if(diagonal2) bingo = true;

    document.getElementById('bingoMessage').style.display =
        bingo ? 'block' : 'none';
}

createBingo();

</script>

</body>
</html>
