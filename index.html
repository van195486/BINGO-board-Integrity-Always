<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Integrity Bingo</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Prompt', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0a3a70 0%, #031a3a 100%);
            padding: 15px;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            background: linear-gradient(180deg, #1b62a6 0%, #104276 100%);
            border-radius: 25px;
            padding: 25px 15px 20px 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
        }

        /* ส่วนหัว Header ที่ตัดข้อความออกแล้ว เหลือแค่ Score */
        .header {
            display: flex;
            justify-content: flex-end; /* จัด Score ให้อยู่ชิดขวา */
            align-items: flex-start;
            color: white;
            margin-bottom: 15px;
            padding: 0 5px;
        }

        .score-area {
            text-align: right;
            font-weight: 700;
            font-size: 14px;
        }

        .score-number {
            font-size: 32px;
            color: #fca311;
            line-height: 1;
        }

        .divider {
            height: 2px;
            background: rgba(255,255,255,0.1);
            margin: 15px 5px 20px 5px;
            position: relative;
        }
        .divider::after {
            content: '';
            position: absolute;
            top: 5px;
            left: 0;
            width: 100%;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }

        table { 
            border-collapse: separate; 
            border-spacing: 8px; 
            width: 100%;
            table-layout: fixed; 
            margin-bottom: 15px;
        }

        td {
            width: 20%; 
            aspect-ratio: 1 / 1; 
            background-color: #ffffff;
            border: 2px solid #f6a122; 
            border-radius: 12px; 
            text-align: center; 
            vertical-align: middle;
            font-weight: 600; 
            color: #0b2e59; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            padding: 2px; 
            font-size: clamp(10px, 2.8vw, 14px); /* ขนาดตัวอักษรพื้นฐานตั้งต้น */
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            
            /* บังคับให้อยู่บรรทัดเดียวเสมอ */
            white-space: nowrap;
            overflow: hidden;
        }

        td:active {
            transform: scale(0.95);
        }

        td.marked { 
            background: linear-gradient(180deg, #ffb703 0%, #fb8500 100%);
            color: white; 
            border-color: #e67e22; 
        }
        
        .free-space { 
            background: linear-gradient(180deg, #ffb703 0%, #fb8500 100%) !important;
            color: white !important;
            border: none !important;
            font-size: clamp(12px, 3.5vw, 16px) !important;
            font-weight: 700 !important;
            cursor: default;
        }

        .footer-text {
            text-align: center;
            color: rgba(255,255,255,0.8);
            font-size: 12px;
            font-weight: 400;
        }

        #bingoOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(4, 33, 67, 0.95); display: none;
            justify-content: center; align-items: center; z-index: 10;
            flex-direction: column;
        }
        #bingoText { 
            font-size: 80px; 
            color: #ffffff; 
            font-weight: 700; 
            text-shadow: 0 0 20px #fca311, 4px 4px 0px #fca311; 
        }
        .close-hint { color: white; margin-top: 10px; font-weight: 300; }

    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <div class="score-area">
                BINGO<br>
                <div class="score-number" id="scoreDisplay">0</div>
            </div>
        </div>

        <div class="divider"></div>

        <table id="bingoTable"></table>

        <div class="footer-text">พร้อมรับมือความท้าทาย เพื่อทุกเป้าหมาย</div>
    </div>
    
    <div id="bingoOverlay" onclick="this.style.display='none'">
        <div id="bingoText">BINGO!</div>
        <div class="close-hint">(แตะหน้าจอเพื่อเล่นต่อ)</div>
    </div>

    <script>
        const allWords = [
            "Sincere", "Honest", "Transparency", "Trustworthy", "Accountability",
            "Ethical", "Integrity", "Fair", "Truth", "Reliable",
            "Responsible", "Authenticity", "Commitment", "Dedication", "Uprightness",
            "Probity", "Principle", "Respect", "Empathy", "Consistency",
            "ซื่อสัตย์", "จริงใจ", "โปร่งใส", "ซื่อตรง", "ตรงไปตรงมา", 
            "สุจริต", "ความถูกต้อง", "รักษาคำพูด", "เที่ยงตรง", "น่าเชื่อถือ", 
            "ไม่โกง", "ไว้ใจได้", "มั่นคง", "รับผิดชอบ", "ตรวจสอบได้", 
            "สัจจะ", "เป็นคนดี", "ยุติธรรม", "คุณธรรม", "ไม่โกหก", 
            "ชัดเจน", "เชื่อใจ", "เปิดเผย", "ขยัน", "ครบถ้วน", 
            "ถูกต้อง", "ตรงต่อเวลา", "เคารพกฎ", "เคารพหน้าที่", "สม่ำเสมอ", 
            "มีวินัย", "กล้าหาญ", "อดทน", "เสียสละ", "เมตตา", 
            "เห็นอกเห็นใจ", "ให้เกียรติ", "เคารพกัน", "สามัคคี", "ร่วมมือ", 
            "ตั้งใจ", "มุ่งมั่น", "ทุ่มเท", "รับฟัง", "ใจกว้าง", 
            "รอบคอบ", "พัฒนา", "เรียนรู้", "ความจริง", "ความโปร่งใส", 
            "ความรับผิดชอบ", "ความน่าเชื่อถือ", "ความยุติธรรม", "ความไว้วางใจ", "ความซื่อตรง", 
            "ความมุ่งมั่น", "ความสม่ำเสมอ", "ความเคารพ", "ความร่วมมือ", "ความเมตตา"
        ];

        let totalBingos = 0;
        let lastBingoState = false;

        function createBingo() {
            const table = document.getElementById('bingoTable');
            let shuffled = [...allWords].sort(() => 0.5 - Math.random()).slice(0, 24);
            
            for (let i = 0; i < 5; i++) {
                let row = table.insertRow();
                for (let j = 0; j < 5; j++) {
                    let cell = row.insertCell();
                    if (i === 2 && j === 2) {
                        cell.className = 'free-space marked';
                        cell.innerHTML = 'FREE';
                    } else {
                        cell.innerHTML = shuffled.pop();
                        cell.onclick = function() { 
                            this.classList.toggle('marked'); 
                            checkBingo(); 
                        };
                    }
                }
            }
            // ปรับขนาดตัวอักษรหลังจากสร้างตารางเสร็จ
            setTimeout(adjustFontSizeToFit, 0);
        }

        // ฟังก์ชันใหม่: ค่อยๆ ลดขนาดฟอนต์ของคำที่ล้น ให้พอดีกับ 1 บรรทัดในช่อง
        function adjustFontSizeToFit() {
            const cells = document.querySelectorAll('#bingoTable td');
            cells.forEach(cell => {
                // รีเซ็ตค่าฟอนต์กลับเป็นค่าดั้งเดิมก่อน
                cell.style.fontSize = ''; 
                let currentSize = parseFloat(window.getComputedStyle(cell).fontSize);
                
                // ตรวจสอบว่าความกว้างเนื้อหา (scrollWidth) ทะลุกรอบ (clientWidth) หรือไม่
                // ถ้าทะลุ ให้ลดขนาดฟอนต์ทีละ 0.5 จนกว่าจะพอดี
                while (cell.scrollWidth > cell.clientWidth - 4 && currentSize > 6) {
                    currentSize -= 0.5;
                    cell.style.fontSize = currentSize + 'px';
                }
            });
        }

        function checkBingo() {
            const grid = Array.from(document.querySelectorAll('td')).map(c => c.classList.contains('marked'));
            let isBingo = false;
            
            for (let i = 0; i < 5; i++) {
                if ([0,1,2,3,4].every(j => grid[i*5 + j]) || [0,1,2,3,4].every(j => grid[j*5 + i])) isBingo = true;
            }
            if ([0,6,12,18,24].every(i => grid[i]) || [4,8,12,16,20].every(i => grid[i])) isBingo = true;
            
            if (isBingo && !lastBingoState) {
                document.getElementById('bingoOverlay').style.display = 'flex';
                totalBingos++;
                document.getElementById('scoreDisplay').innerText = totalBingos;
            }
            
            lastBingoState = isBingo;
        }

        // จัดการให้ปรับฟอนต์ใหม่ด้วยเมื่อผู้ใช้หมุนหน้าจอโทรศัพท์
        window.addEventListener('resize', adjustFontSizeToFit);

        createBingo();
    </script>
</body>
</html>
