<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Bingo</title>
    <style>
        :root {
            --primary-color: #524388;
            --accent-color: #F1921E;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 { color: var(--primary-color); margin-bottom: 20px; }

        /* การใช้ CSS Grid ทำให้ตารางแบ่งช่องเท่ากันเป๊ะ 100% */
        .bingo-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 600px; /* ไม่ให้ใหญ่เกินไปในจอคอม */
            aspect-ratio: 1 / 1; /* บังคับให้ตารางเป็นจัตุรัสเสมอ */
        }

        .cell {
            background: white;
            border: 2px solid var(--primary-color);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 5px;
            font-size: clamp(10px, 2.5vw, 16px); /* ปรับขนาดตัวอักษรให้อัตโนมัติ */
            font-weight: 600;
            color: var(--primary-color);
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }

        .cell:hover { background-color: #edeaf7; }

        .cell.marked {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--accent-color);
        }

        .free-space {
            background-color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .free-space img {
            width: 80%;
            height: 80%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <h1>INTEGRITY BINGO</h1>
    <div class="bingo-grid" id="bingoGrid"></div>

    <script>
        const words = ["ซื่อสัตย์", "จริงใจ", "โปร่งใส", "ซื่อตรง", "ตรงไปตรงมา", "สุจริต", "ความถูกต้อง", "รักษาคำพูด", "เที่ยงตรง", "น่าเชื่อถือ", "ไม่โกง", "ไว้ใจได้", "มั่นคง", "รับผิดชอบ", "ตรวจสอบได้", "สัจจะ", "เป็นคนดี", "ยุติธรรม", "คุณธรรม", "ไม่โกหก", "ชัดเจน", "เชื่อใจ", "เปิดเผย", "ขยัน", "ครบถ้วน"];
        
        function initGame() {
            const grid = document.getElementById('bingoGrid');
            const shuffled = [...words].sort(() => Math.random() - 0.5);
            
            grid.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                
                if (i === 12) { // ช่องกลาง
                    cell.className += ' free-space marked';
                    cell.innerHTML = '<img src="image_bc9682.png" alt="Logo">';
                } else {
                    cell.textContent = shuffled.pop();
                    cell.onclick = () => cell.classList.toggle('marked');
                }
                grid.appendChild(cell);
            }
        }
        initGame();
    </script>
</body>
</html>
