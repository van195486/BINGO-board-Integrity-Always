<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integrity Bingo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f8f9fa;
            padding-bottom: 50px;
        }

        h1 { 
            color: #524388; 
            margin-top: 30px; 
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .chart-container {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 120px;
            display: flex; justify-content: space-around; align-items: flex-end;
            z-index: 0; opacity: 0.3; pointer-events: none;
        }
        .bar { width: 40px; border-radius: 5px 5px 0 0; animation: stockMove 2.5s infinite ease-in-out; }
        .bar:nth-child(4n+1) { background-color: #e74c3c; }
        .bar:nth-child(4n+2) { background-color: #f39c12; }
        .bar:nth-child(4n+3) { background-color: #f1c40f; }
        .bar:nth-child(4n+4) { background-color: #3498db; }

        @keyframes stockMove {
            0%, 100% { height: 40px; }
            50% { height: 120px; }
        }

        table { 
            border-collapse: separate; border-spacing: 8px; 
            background: white; border-radius: 20px; 
            padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            z-index: 1; margin-top: 20px; border: 3px solid #524388;
        }
        td {
            width: 115px; height: 115px; border: 2px solid #524388;
            border-radius: 15px; text-align: center; font-weight: bold; 
            color: #524388; cursor: pointer; transition: 0.3s; 
            padding: 5px; font-size: 14px;
            box-sizing: border-box;
            word-wrap: break-word;
        }
        td:hover { background-color: #f0f0f0; }
        td.marked { background-color: #524388 !important; color: white; border-color: #F1921E; }
        
        .free-space { border: 2px solid #F1921E !important; background: #fff3e0 !important; cursor: default; }
        .free-space img { width: 60px; height: 60px; border-radius: 50%; display: block; margin: 0 auto; }

        .btn-reset {
            margin-top: 20px; padding: 10px 25px; font-size: 16px; font-weight: bold;
            color: white; background-color: #524388; border: none; border-radius: 25px;
            cursor: pointer; z-index: 1; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-reset:hover { background-color: #3f326d; transform: translateY(-2px); }

        #bingoOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95); display: none;
            justify-content: center; align-items: center; z-index: 10;
            flex-direction: column; cursor: pointer;
        }
        #bingoText { font-size: 80px; color: #524388; font-weight: bold; text-shadow: 5px 5px #F1921E; }
        .close-hint { font-size: 18px; color: #666; margin-top: 20px; }
    </style>
</head>
<body>

    <table id="bingoTable"></table>

    </div>
