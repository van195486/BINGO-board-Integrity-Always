<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integrity Bingo</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f8f9fa;
        }

        h1 { 
            color: #524388; 
            margin-top: 30px; 
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* กราฟแท่งสีสัน */
        .chart-container {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 200px;
            display: flex; justify-content: space-around; align-items: flex-end;
            z-index: 0; opacity: 0.6;
        }
        .bar { width: 40px; border-radius: 5px 5px 0 0; animation: stockMove 2.5s infinite ease-in-out; }
        .bar:nth-child(4n+1) { background-color: #e74c3c; }
        .bar:nth-child(4n+2) { background-color: #f39c12; }
        .bar:nth-child(4n+3) { background-color: #f1c40f; }
        .bar:nth-child(4n+4) { background-color: #3498db; }

        @keyframes stockMove {
            0%, 100% { height: 60px; }
            50% { height: 200px; }
        }

        /* [ปรับปรุงจุดที่ 1] ปรับตารางแบบ Responsive รองรับคอมและมือถือพอดีจอ */
        table { 
            border-collapse: separate; border-spacing: 8px; 
            background: white; border-radius: 20px; 
            padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            z-index: 1; margin-top: 20px; border: 3px solid #524388;
            table-layout: fixed;
            width: 95%;
            max-width: 600px; /* ขนาดสูงสุดเมื่อดูบนคอมพิวเตอร์ */
        }

        /* [ปรับปรุงจุดที่ 1] บังคับสี่เหลี่ยมจัตุรัสและคำไม่ล้นด้วยหน่วย Aspect Ratio */
        td {
            width: 20%; /* แบ่ง 5 ช่องเท่ากัน 100% */
            aspect-ratio: 1 / 1; /* บังคับให้เป็นสี่เหลี่ยมจัตุรัสเสมอไม่ว่าจะอยู่บนจอไหน */
            border: 2px solid #524388;
            border-radius: 15px; text-align: center; font-weight: bold; 
            color: #524388; cursor: pointer; transition: 0.3s; 
            padding: 5px; 
            font-size: calc(10px + 0.4vw); /* ปรับขนาดฟอนต์ยืดหยุ่นตามหน้าจออัตโนมัติ */
            box-sizing: border-box;
            vertical-align: middle;
            
            /* ป้องกันคำล้นช่อง
